# Optional convenience stack: runs the Python trainer/API and the Vite dev server.
# Local dev without Docker is fully supported too — see the README.
services:
  trainer:
    image: python:3.12-slim
    working_dir: /app/trainer
    command: >
      bash -c "pip install -e '.[dev]' &&
               python -m uvicorn wordle_evolution.server.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./trainer:/app/trainer
    ports:
      - "8000:8000"

  web:
    image: node:20-slim
    working_dir: /app/apps/web
    command: >
      bash -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    depends_on:
      - trainer
